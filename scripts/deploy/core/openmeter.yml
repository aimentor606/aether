# compose.openmeter.yml
# OpenMeter Usage Metering (self-hosted)
# Requires: app-network external Docker network

services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.12-alpine
    container_name: clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: openmeter
      CLICKHOUSE_USER: openmeter
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-openmeter}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - ${DATA_ROOT:-/data}/clickhouse:/var/lib/clickhouse
    ports:
      - "127.0.0.1:8123:8123"
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user openmeter --password ${CLICKHOUSE_PASSWORD:-openmeter} --query 'SELECT 1'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: "1"

  kafka:
    image: apache/kafka:3.9.0
    container_name: kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: "${KAFKA_CLUSTER_ID}"
    volumes:
      - ${DATA_ROOT:-/data}/kafka:/var/lib/kafka/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: "1"

  openmeter:
    image: ghcr.io/openmeterio/openmeter:latest
    container_name: openmeter
    restart: unless-stopped
    depends_on:
      clickhouse:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      OPENMETER_PORT: 8888
      OPENMETER_ADDRESS: ":8888"
      OPENMETER_CLICKHOUSE_URL: clickhouse://clickhouse:9000?username=openmeter&password=${CLICKHOUSE_PASSWORD:-openmeter}&database=openmeter
      OPENMETER_KAFKA_BROKERS: kafka:9092
      OPENMETER_DATABASE_URL: postgresql://${OPENMETER_DB_USER:-openmeter}:${OPENMETER_DB_PASSWORD:-openmeter}@supabase-db:5432/${OPENMETER_DB_DATABASE:-openmeter}
    ports:
      - "127.0.0.1:8888:8888"
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8888/api/v1/meters || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: "0.5"

networks:
  app-network:
    external: true
    name: app-network
