# compose.newapi.yml
# newapi Business Service

services:
  llm-proxy:
    image: ${NEWAPI_IMAGE:-calciumion/new-api:v0.12.1}
    container_name: llm-proxy
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - TZ=${TZ:-Asia/Shanghai}
      - SESSION_SECRET=${SESSION_SECRET:-CHANGE_ME}
      
      # Database Connection (Use dedicated user)
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_USER=${NEWAPI_DB_USER:-newapi}
      - DATABASE_PASSWORD=${NEWAPI_DB_PASSWORD:-aetherai@newapi8864}
      - DATABASE_NAME=${NEWAPI_DB_DATABASE:-newapi}
      - SQL_DSN=postgres://${NEWAPI_DB_USER:-newapi}:${NEWAPI_DB_PASSWORD:-aetherai@newapi8864}@postgres:5432/${NEWAPI_DB_DATABASE:-newapi}
      
      # Redis Connection
      - REDIS_CONN_STRING=redis://:${REDIS_PASSWORD:-aetherai@redis8864}@redis:6379

      # Rate Limiting
      - GLOBAL_API_RATE_LIMIT_ENABLE=false
      - GLOBAL_WEB_RATE_LIMIT_ENABLE=false

    volumes:
      - ./config/newapi:/app/newapi/config:ro
      - /data/logs/newapi:/app/newapi/logs
      - /data/uploads/newapi:/app/newapi/uploads
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  app-network:
    external: true
    name: app-network
