###############################################################################
# LiteLLM Proxy Cluster with Redis & Nginx Load Balancer
# Generated for Aether LLM Infrastructure
# References: docs/plans/2026-04-11-litellm-integration-design.md ┬¦6.1
###############################################################################

version: '3.8'

services:
  # ============================================================================
  # Redis: Multi-instance state management (7-alpine, 512MB maxmemory)
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: litellm-redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    restart: unless-stopped
    networks:
      - litellm_network

  # ============================================================================
  # LiteLLM Proxy Instance 1
  # ============================================================================
  litellm-1:
    image: ghcr.io/berriai/litellm:v1.40.74
    container_name: litellm-1
    ports:
      - "4001:4000"
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - AZURE_API_KEY=${AZURE_API_KEY}
      - AZURE_API_BASE=${AZURE_API_BASE}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION_NAME=${AWS_REGION_NAME}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - ZHI_PU_API_KEY=${ZHI_PU_API_KEY}
      - MOONSHOT_API_KEY=${MOONSHOT_API_KEY}
    volumes:
      - ./config.yaml:/app/config.yaml
    env_file:
      - .env
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - litellm_network

  # ============================================================================
  # LiteLLM Proxy Instance 2
  # ============================================================================
  litellm-2:
    image: ghcr.io/berriai/litellm:v1.40.74
    container_name: litellm-2
    ports:
      - "4002:4000"
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - AZURE_API_KEY=${AZURE_API_KEY}
      - AZURE_API_BASE=${AZURE_API_BASE}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION_NAME=${AWS_REGION_NAME}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - ZHI_PU_API_KEY=${ZHI_PU_API_KEY}
      - MOONSHOT_API_KEY=${MOONSHOT_API_KEY}
    volumes:
      - ./config.yaml:/app/config.yaml
    env_file:
      - .env
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - litellm_network

  # ============================================================================
  # LiteLLM Proxy Instance 3
  # ============================================================================
  litellm-3:
    image: ghcr.io/berriai/litellm:v1.40.74
    container_name: litellm-3
    ports:
      - "4003:4000"
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - AZURE_API_KEY=${AZURE_API_KEY}
      - AZURE_API_BASE=${AZURE_API_BASE}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION_NAME=${AWS_REGION_NAME}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - ZHI_PU_API_KEY=${ZHI_PU_API_KEY}
      - MOONSHOT_API_KEY=${MOONSHOT_API_KEY}
    volumes:
      - ./config.yaml:/app/config.yaml
    env_file:
      - .env
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - litellm_network

  # ============================================================================
  # LiteLLM Proxy Instance 4
  # ============================================================================
  litellm-4:
    image: ghcr.io/berriai/litellm:v1.40.74
    container_name: litellm-4
    ports:
      - "4004:4000"
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - AZURE_API_KEY=${AZURE_API_KEY}
      - AZURE_API_BASE=${AZURE_API_BASE}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION_NAME=${AWS_REGION_NAME}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - ZHI_PU_API_KEY=${ZHI_PU_API_KEY}
      - MOONSHOT_API_KEY=${MOONSHOT_API_KEY}
    volumes:
      - ./config.yaml:/app/config.yaml
    env_file:
      - .env
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - litellm_network

  # ============================================================================
  # Nginx: Load Balancer (least_conn routing, SSE support, health checks)
  # ============================================================================
  nginx:
    image: nginx:latest
    container_name: litellm-nginx
    ports:
      - "4000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - litellm-1
      - litellm-2
      - litellm-3
      - litellm-4
    restart: unless-stopped
    networks:
      - litellm_network

networks:
  litellm_network:
    driver: bridge

volumes:
  redis_data:
    driver: local
