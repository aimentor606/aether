# compose.redis.yml
# Redis Service (Independent)

services:
  redis:
    image: redis:8.6
    container_name: redis
    restart: unless-stopped
    user: "999"
    command: >
      redis-server
      --appendonly yes
      --maxmemory ${REDIS_MAX_MEMORY:-256mb}
      --maxmemory-policy allkeys-lru
      --logfile /var/log/redis/redis.log
      ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}
    volumes:
      - /data/redis:/data
      - /data/logs/redis:/var/log/redis
    networks:
      - app-net
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ${REDIS_PASSWORD:+-a $REDIS_PASSWORD} ping | grep PONG"]
      interval: 10s
      timeout: 3s
      retries: 3

networks:
  app-net:
    external: true
    name: app-network
