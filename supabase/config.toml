# ║  DEPRECATED — This file is preserved for reference only.                   ║
# ║                                                                             ║
# ║  The project now uses a self-hosted Supabase stack via Docker Compose:     ║
# ║    scripts/supabase/docker-compose.yml                                     ║
# ║                                                                             ║
# ║  Use ./scripts/dev-local.sh (dev) or ./scripts/start-local.sh (prod)       ║
# ║  instead of `supabase start`.                                              ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

project_id = "aether-local"

# ─── API (PostgREST) ─────────────────────────────────────────────────────────
[api]
enabled = true
port = 54321
schemas = ["public", "aether"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

# ─── Database ─────────────────────────────────────────────────────────────────
[db]
port = 54322
major_version = 17

[db.pooler]
enabled = false

# ─── Auth (GoTrue) ────────────────────────────────────────────────────────────
[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://127.0.0.1:3000", "http://localhost:3000"]
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false

# ─── Realtime ─────────────────────────────────────────────────────────────────
[realtime]
enabled = false

# ─── Storage ──────────────────────────────────────────────────────────────────
[storage]
enabled = false

# ─── Edge Functions ───────────────────────────────────────────────────────────
[edge_runtime]
enabled = false

# ─── Studio (Dashboard UI) ───────────────────────────────────────────────────
[studio]
enabled = true
port = 54323

# ─── Inbucket (Email testing) ────────────────────────────────────────────────
[inbucket]
enabled = true
port = 54324

# ─── Analytics ────────────────────────────────────────────────────────────────
[analytics]
enabled = false
