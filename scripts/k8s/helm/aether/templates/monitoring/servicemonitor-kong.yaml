{{- if and .Values.monitoring.enabled .Values.kong.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "aether.fullname" . }}-kong
  namespace: {{ include "aether.namespace" . }}
  labels:
    {{- include "aether.labels" . | nindent 4 }}
    app.kubernetes.io/component: kong
    release: prometheus
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: kong
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
{{- end }}
