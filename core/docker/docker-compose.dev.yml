# Dev mode overlay — bind-mounts local source into the running container.
#
# Usage (via pnpm dev:sandbox):
#   docker compose -f core/docker/docker-compose.yml \
#                  -f core/docker/docker-compose.dev.yml up
#
# The base docker-compose.yml uses the image with ALL deps prebaked at build
# time. This overlay then mounts your local source OVER the prebaked code so
# changes are reflected immediately without rebuilding.
#
# You only need --build when:
#   - Dockerfile changes
#   - A new npm/bun dependency is added
#   - package.json changes
#
# For pure code changes (TypeScript, agents, skills, tools):
#   Edit the file → it's already live in the container
#   Restart the service if needed:
#     docker exec acme-sandbox s6-svc -r /run/service/svc-acme-master
#
# Note: volume host paths are relative to this compose file's directory (core/docker/)

services:
  desktop:
    environment:
      - ACME_DEV_MODE=1
    volumes:
      # Bind-mount local source over the prebaked /opt dirs
      # All packages now live inside core/acme-master/
      - ../acme-master/src:/ephemeral/acme-master/src:ro
      - ../acme-master/opencode/plugin:/ephemeral/acme-master/opencode/plugin:ro
      - ../acme-master/opencode/agents:/ephemeral/acme-master/opencode/agents:ro
      - ../acme-master/opencode/commands:/ephemeral/acme-master/opencode/commands:ro
      - ../acme-master/opencode/skills:/ephemeral/acme-master/opencode/skills:ro
      - ../acme-master/opencode/tools:/ephemeral/acme-master/opencode/tools:ro
      - ../acme-master/opencode/patches:/ephemeral/acme-master/opencode/patches:ro
      - ../acme-master/opencode/opencode.jsonc:/ephemeral/acme-master/opencode/opencode.jsonc:ro
      - ../acme-master/channels/src:/ephemeral/acme-master/channels/src:ro
      - ../acme-master/triggers/src:/ephemeral/acme-master/triggers/src:ro
      # Service scripts (baked-in JS for static-web, agent-browser-viewer)
      - ../services:/ephemeral/services:ro
