apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aether.api.fullname" . }}
  namespace: {{ include "aether.namespace" . }}
  labels:
    {{- include "aether.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      {{- include "aether.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "aether.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secrets: {{ include (print $.Template.BasePath "/secrets.yaml") . | sha256sum }}
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: api
          image: {{ .Values.api.image }}
          ports:
            - name: http
              containerPort: {{ .Values.api.port }}
          env:
            - name: PORT
              value: {{ .Values.api.port | quote }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  {{- /* CNPG creates a Secret named <cluster>-app with uri key */ -}}
                  name: {{ include "aether.cnpg.fullname" . }}-app
                  key: uri
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "aether.secretName" . }}
                  key: JWT_SECRET
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ include "aether.configName" . }}
                  key: REDIS_HOST
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "aether.secretName" . }}
                  key: REDIS_PASSWORD
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "aether.configName" . }}
                  key: REDIS_PORT
            {{- if .Values.openmeter.enabled }}
            - name: OPENMETER_API_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "aether.configName" . }}
                  key: OPENMETER_API_ENDPOINT
            - name: OPENMETER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "aether.secretName" . }}
                  key: OPENMETER_API_KEY
                  optional: true
            - name: OPENMETER_EVENT_TYPE
              valueFrom:
                configMapKeyRef:
                  name: {{ include "aether.configName" . }}
                  key: OPENMETER_EVENT_TYPE
            {{- end }}
          livenessProbe:
            httpGet:
              path: /v1/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /v1/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
