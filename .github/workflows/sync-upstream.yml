name: Sync Upstream (Merging Rebase)

on:
  schedule:
    # Every Sunday at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "Aether Sync Bot"
          git config user.email "sync@aether.local"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/aimentor606/aether.git || true
          git fetch upstream --tags

      - name: Perform Merging Rebase
        id: rebase
        run: |
          # Get current branch
          CURRENT_BRANCH=$(git rev-parse --abbrev-ref HEAD)
          echo "current_branch=$CURRENT_BRANCH" >> $GITHUB_OUTPUT
          
          # Fetch upstream main
          git fetch upstream main
          
          # Attempt Merging Rebase: merge upstream/main into current branch
          # This preserves local commits while integrating upstream changes
          git merge --ff upstream/main || {
            # If fast-forward fails, do a proper merge
            echo "Fast-forward not possible, performing merge commit..."
            git merge upstream/main --no-edit --no-ff || {
              echo "Merge conflict detected. Manual intervention required."
              exit 1
            }
          }
          
          echo "merge_status=success" >> $GITHUB_OUTPUT

      - name: Push changes
        if: steps.rebase.outputs.merge_status == 'success'
        run: |
          git push origin ${{ steps.rebase.outputs.current_branch }}

      - name: Create PR (if conflicts occur - manual review)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠️ Upstream sync failed: merge conflicts detected. Manual intervention required.\n\nReview conflicts and resolve before merging upstream changes.'
            })
