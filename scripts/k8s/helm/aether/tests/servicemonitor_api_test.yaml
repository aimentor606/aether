suite: ServiceMonitor API
templates:
  - templates/monitoring/servicemonitor-api.yaml
tests:
  - it: renders when victoriametrics enabled
    set:
      victoriametrics.enabled: true
    asserts:
      - isKind:
          of: ServiceMonitor
      - hasDocuments:
          count: 1
      - equal:
          path: metadata.name
          value: RELEASE-NAME-aether-api
      - equal:
          path: spec.endpoints[0].port
          value: http
      - equal:
          path: spec.endpoints[0].path
          value: /metrics
      - equal:
          path: spec.endpoints[0].interval
          value: 30s

  - it: includes observability label
    set:
      victoriametrics.enabled: true
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/part-of"]
          value: observability

  - it: skips rendering when victoriametrics disabled
    set:
      victoriametrics.enabled: false
    asserts:
      - hasDocuments:
          count: 0
