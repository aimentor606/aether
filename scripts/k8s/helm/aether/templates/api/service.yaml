apiVersion: v1
kind: Service
metadata:
  name: {{ include "aether.api.fullname" . }}
  namespace: {{ include "aether.namespace" . }}
  labels:
    {{- include "aether.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.api.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "aether.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
