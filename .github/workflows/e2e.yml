name: E2E Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: e2e-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  E2E_BASE_URL: http://localhost:13737
  E2E_API_URL: http://localhost:13738/v1
  E2E_SUPABASE_URL: http://localhost:13740
  E2E_OWNER_EMAIL: test@aether.ai
  E2E_OWNER_PASSWORD: testpass123

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: |
          corepack enable pnpm
          pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start Supabase
        run: |
          docker network inspect app-network >/dev/null 2>&1 || docker network create app-network
          docker compose -f scripts/supabase/docker-compose.yml --env-file scripts/supabase/.env up -d

      - name: Wait for Supabase
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:13740/health >/dev/null 2>&1; then
              echo "Supabase is ready"
              break
            fi
            echo "Waiting for Supabase... ($i/60)"
            sleep 2
          done

      - name: Start API
        run: |
          AETHER_SKIP_ENSURE_SCHEMA=1 pnpm --filter aether-api dev &
          API_PID=$!
          echo "API_PID=$API_PID" >> $GITHUB_ENV

      - name: Start Web
        run: |
          pnpm --filter aether-Frontend dev &
          WEB_PID=$!
          echo "WEB_PID=$WEB_PID" >> $GITHUB_ENV

      - name: Wait for API
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:13738/v1/health >/dev/null 2>&1; then
              echo "API is ready"
              break
            fi
            echo "Waiting for API... ($i/60)"
            sleep 2
          done

      - name: Wait for Web
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:13737 >/dev/null 2>&1; then
              echo "Web is ready"
              break
            fi
            echo "Waiting for Web... ($i/60)"
            sleep 2
          done

      - name: Run E2E tests
        run: npx playwright test --project=chromium --reporter=list
        working-directory: tests
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: test-results/
          retention-days: 14

      - name: Stop services
        if: always()
        run: |
          kill ${{ env.API_PID }} 2>/dev/null || true
          kill ${{ env.WEB_PID }} 2>/dev/null || true
          docker compose -f scripts/supabase/docker-compose.yml --env-file scripts/supabase/.env down || true
