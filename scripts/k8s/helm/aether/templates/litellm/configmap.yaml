{{- if .Values.litellm.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "aether.litellm.fullname" . }}-config
  namespace: {{ include "aether.namespace" . }}
  labels:
    {{- include "aether.labels" . | nindent 4 }}
    app.kubernetes.io/component: litellm
data:
  config.yaml: |
    model_list:
    {{- toYaml .Values.litellm.modelList | nindent 6 }}

    litellm_settings:
    {{- toYaml .Values.litellm.litellmSettings | nindent 6 }}

    router_settings:
    {{- toYaml .Values.litellm.routerSettings | nindent 6 }}
{{- end }}
