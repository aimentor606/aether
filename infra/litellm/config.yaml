###############################################################################
# LiteLLM Proxy Configuration
# Generated for Aether LLM Infrastructure (v1.40.74)
# References: docs/plans/2026-04-11-litellm-integration-design.md §5.1
###############################################################################

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  database_connection_pool_limit: 100
  redis_host: os.environ/REDIS_HOST
  redis_port: os.environ/REDIS_PORT
  redis_password: os.environ/REDIS_PASSWORD
  routing_strategy: "simple-shuffle"
  num_retries: 3
  request_timeout: 600
  fallbacks: true
  context_window_fallbacks: true
  configurable_clientside_auth_params:
    - "api_key"
    - "anthropic_key"
    - "openai_key"
  success_callback:
    - "prometheus"

model_list:
  - model_name: "gpt-4o"
    litellm_params:
      model: "openai/gpt-4o"
      api_key: os.environ/OPENAI_API_KEY
    fallbacks:
      - "gpt-4o-fallback-azure"

  - model_name: "gpt-4o-fallback-azure"
    litellm_params:
      model: "azure/gpt-4o"
      api_key: os.environ/AZURE_API_KEY
      api_base: os.environ/AZURE_API_BASE

  - model_name: "claude-sonnet-4-20250514"
    litellm_params:
      model: "anthropic/claude-sonnet-4-20250514"
      api_key: os.environ/ANTHROPIC_API_KEY
    fallbacks:
      - "claude-sonnet-4-fallback-bedrock"

  - model_name: "claude-sonnet-4-fallback-bedrock"
    litellm_params:
      model: "bedrock/anthropic.claude-sonnet-4-20250514-v1:0"
      aws_access_key_id: os.environ/AWS_ACCESS_KEY_ID
      aws_secret_access_key: os.environ/AWS_SECRET_ACCESS_KEY
      aws_region_name: os.environ/AWS_REGION_NAME

  - model_name: "deepseek-chat"
    litellm_params:
      model: "deepseek/deepseek-chat"
      api_key: os.environ/DEEPSEEK_API_KEY

  - model_name: "minimax-m2.7"
    litellm_params:
      model: "minimax/minimax-m2.7"
      api_key: os.environ/MINIMAX_API_KEY

  - model_name: "glm-5-turbo"
    litellm_params:
      model: "z-ai/glm-5-turbo"
      api_key: os.environ/ZHI_PU_API_KEY

  - model_name: "kimi-k2.5"
    litellm_params:
      model: "moonshotai/kimi-k2.5"
      api_key: os.environ/MOONSHOT_API_KEY

router_settings:
  enable_cooldown: true
  cooldown_time: 0.5
  enable_pre_call_checks: true
