{{- if .Values.kong.enabled }}
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: correlation-id
  namespace: {{ include "aether.namespace" . }}
  labels:
    {{- include "aether.labels" . | nindent 4 }}
config:
  header_name: X-Request-ID
  generator: uuid
  echo_downstream: true
plugin: correlation-id
{{- end }}
