_format_version: "3.0"
_transform: true

upstreams:
  # ── Aether API (control plane) ─────────────────────────────────────────────
  - name: upstream-aether-api
    algorithm: round-robin
    targets:
      - target: aether-api:${{ env "DECK_AETHER_API_PORT" }}
        weight: 100

  # ── LiteLLM Proxy (data plane + management) ────────────────────────────────
  - name: upstream-litellm
    algorithm: round-robin
    targets:
      - target: llm-proxy:${{ env "DECK_LLM_PROXY_PORT" }}
        weight: 100

services:
  # ── Control Plane: Aether API ──────────────────────────────────────────────
  # Auth, billing, credential issuance, sandbox orchestration.
  # Aether handles auth internally (combinedAuth middleware), no Kong key-auth.
  - name: svc-control
    url: http://upstream-aether-api
    connect_timeout: 5000
    read_timeout: 60000
    write_timeout: 60000
    retries: 2
    tags:
      - backend
      - api
      - control-plane

    routes:
      - name: route-control
        paths:
          - /v1/control
        methods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - OPTIONS
        strip_path: false
        tags:
          - control-plane

      - name: route-api-platform
        paths:
          - /v1/platform
          - /v1/billing
          - /v1/aether-projects
          - /v1/integrations
          - /v1/servers
          - /v1/providers
          - /v1/secrets
          - /v1/queue
          - /v1/setup
          - /v1/verticals
        methods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - OPTIONS
        strip_path: false
        tags:
          - api-routes

      # Catch-all for other /v1/* routes that Aether handles
      - name: route-api-v1-catchall
        paths:
          - /v1
        methods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - OPTIONS
        strip_path: false
        tags:
          - api-route

      # Tunnel and sandbox proxy routes
      - name: route-api-tunnel
        paths:
          - /v1/tunnel
        methods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - OPTIONS
        strip_path: false
        tags:
          - tunnel

    plugins:
      - name: rate-limiting
        config:
          minute: 10000
          policy: redis
          redis_host: redis
          redis_port: 6379
          redis_password: ${{ env "REDIS_PASSWORD" }}
          fault_tolerant: true

      - name: cors
        config:
          origins:
            - "${{ env "DECK_PUBLIC_ORIGIN" }}"
          methods:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
            - OPTIONS
          headers:
            - Accept
            - Content-Type
            - Authorization
            - X-API-Key
          credentials: true

  # ── Data Plane: LiteLLM LLM Proxy ──────────────────────────────────────────
  # Virtual key auth. Clients send Authorization: Bearer <virtual_key>.
  # No master key injection — LiteLLM validates virtual keys directly.
  - name: svc-llm
    url: http://upstream-litellm
    connect_timeout: 5000
    read_timeout: 600000
    write_timeout: 600000
    retries: 3
    tags:
      - backend
      - llm
      - data-plane

    routes:
      # Direct LLM endpoint: /llm/v1/chat/completions → LiteLLM /v1/chat/completions
      - name: route-llm-direct
        paths:
          - /llm
        methods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - OPTIONS
        strip_path: true
        tags:
          - llm-direct

      # Backward-compatible: /v1/chat/completions → LiteLLM (virtual key auth)
      - name: route-v1-chat
        paths:
          - /v1/chat/completions
        methods:
          - POST
          - OPTIONS
        strip_path: false
        tags:
          - llm-compat

      # Backward-compatible: /v1/models → LiteLLM
      - name: route-v1-models
        paths:
          - /v1/models
        methods:
          - GET
          - OPTIONS
        strip_path: false
        tags:
          - llm-compat

    plugins:
      - name: rate-limiting
        config:
          minute: 1000
          policy: redis
          redis_host: redis
          redis_port: 6379
          redis_password: ${{ env "REDIS_PASSWORD" }}
          fault_tolerant: true

      - name: cors
        config:
          origins:
            - "${{ env "DECK_PUBLIC_ORIGIN" }}"
          methods:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
            - OPTIONS
          headers:
            - Accept
            - Content-Type
            - Authorization
          credentials: true

  # ── LiteLLM Admin UI + Management ──────────────────────────────────────────
  - name: svc-litellm-ui
    url: http://upstream-litellm
    connect_timeout: 5000
    read_timeout: 60000
    write_timeout: 60000
    tags:
      - litellm
      - ui

    routes:
      - name: route-litellm-ui-chat
        paths:
          - /ui/chat
        strip_path: false
        tags:
          - litellm-ui
        plugins:
          - name: request-transformer
            config:
              replace:
                uri: /ui

      - name: route-litellm-ui
        paths:
          - /ui
        strip_path: false
        tags:
          - litellm-ui

      # Block LiteLLM admin/management paths from external access
      - name: route-litellm-admin-block
        paths:
          - /key
          - /user
          - /team
          - /model
          - /config
          - /guardrails
          - /policies
          - /health/liveliness
          - /health/readiness
        strip_path: false
        tags:
          - litellm-admin-block
        plugins:
          - name: request-termination
            config:
              status_code: 403
              message: "LiteLLM admin API not accessible externally"

      # Catch-all: LiteLLM management uses scattered top-level paths (/key/*, /user/*,
      # /model/*, /health/*, /config/*, /guardrails/*, /policies/*, /server/*, /tools/*,
      # /public/*, /embeddings, /images/*, etc.) that cannot be enumerated individually.
      # Kong matches longest path first, so /v1/control, /v1/chat/completions, /v1/models,
      # /llm, /api, /v1, /v1beta, and /ui hit their specific routes above;
      # everything else falls through here.
      - name: route-litellm-catchall
        paths:
          - /
        strip_path: false
        tags:
          - litellm-catchall

    plugins:
      - name: request-transformer
        config:
          add:
            headers:
              - "X-Forwarded-Host:${{ env "DECK_PUBLIC_HOST" }}"
              - "X-Forwarded-Proto:${{ env "DECK_FORWARDED_PROTO" }}"
          replace:
            headers:
              - "Host:${{ env "DECK_PUBLIC_HOST" }}"

      - name: post-function
        config:
          header_filter:
            - "${{ env "DECK_UI_REDIRECT_REWRITE" }}"

      - name: cors
        config:
          origins:
            - "${{ env "DECK_PUBLIC_ORIGIN" }}"
          methods:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
            - OPTIONS
          headers:
            - Accept
            - Content-Type
            - Authorization
          credentials: true

consumers:
  - username: app-client-01
    custom_id: client-001
    tags:
      - production
    keyauth_credentials:
      - key: ${{ env "DEFAULT_API_KEY" }}
        tags:
          - prod-key

  - username: app-client-02
    custom_id: client-002
    tags:
      - test
    keyauth_credentials:
      - key: ${{ env "PREMIUM_KEY" }}
        tags:
          - test-key

plugins:
  - name: correlation-id
    config:
      header_name: X-Request-ID
      generator: uuid
      echo_downstream: true

  - name: prometheus
    config:
      per_consumer: true
      status_code_metrics: true
      latency_metrics: true
      upstream_health_metrics: true

  - name: file-log
    config:
      path: /var/log/kong/file-log.log
      reopen: true
