# compose.newapi.yml
# newapi Business Service

services:
  llm-proxy:
    image: ${NEWAPI_IMAGE:-calciumion/new-api:v0.12.1}
    container_name: llm-proxy
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3001
      - TZ=${TZ:-Asia/Shanghai}
      - PROXY_BASE_URL=${FORWARDED_PROTO:-https}://${PUBLIC_HOST}
      # Trust Kong's X-Forwarded-* headers (fixes trailing-slash redirect URLs)
      - FORWARDED_ALLOW_IPS=172.16.0.0/12
      - SESSION_SECRET=${SESSION_SECRET:?SESSION_SECRET is required}
      
      # Database Connection (Use dedicated user)
      - DATABASE_HOST=supabase-db
      - DATABASE_PORT=5432
      - DATABASE_USER=${NEWAPI_DB_USER:-newapi}
      - DATABASE_PASSWORD=${NEWAPI_DB_PASSWORD:?NEWAPI_DB_PASSWORD is required}
      - DATABASE_NAME=${NEWAPI_DB_DATABASE:-newapi}
      - SQL_DSN=postgres://${NEWAPI_DB_USER:-newapi}:${NEWAPI_DB_PASSWORD:?NEWAPI_DB_PASSWORD is required}@supabase-db:5432/${NEWAPI_DB_DATABASE:-newapi}
      
      # Redis Connection
      - REDIS_CONN_STRING=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379

      # Rate Limiting
      - GLOBAL_API_RATE_LIMIT_ENABLE=true
      - GLOBAL_WEB_RATE_LIMIT_ENABLE=false

    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2"
    volumes:
      - ./config/newapi:/app/newapi/config:ro
      - ${DATA_ROOT:-/data}/logs/newapi:/app/newapi/logs
      - ${DATA_ROOT:-/data}/uploads/newapi:/app/newapi/uploads
    ports:
      - "127.0.0.1:3001:3001"
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3001/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  app-network:
    external: true
    name: app-network
