_format_version: "3.0"
_transform: true

upstreams:
  - name: upstream-aether-api
    algorithm: round-robin
    targets:
      - target: newapi:3000
        weight: 100

  - name: upstream-aether-frontend
    algorithm: round-robin
    targets:
      - target: newapi:3000
        weight: 100

services:
  - name: svc-api
    url: http://upstream-aether-api
    connect_timeout: 5000
    read_timeout: 30000
    write_timeout: 30000
    retries: 3
    tags:
      - backend
      - api
    
    routes:
      - name: route-api
        paths:
          - /api
        methods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - OPTIONS
        strip_path: false
        tags:
          - api-route

      - name: route-v1beta
        paths:
          - /v1beta
        methods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - OPTIONS
        strip_path: false
        tags:
          - api-route

    plugins:
      - name: key-auth
        config:
          key_names:
            - apikey
            - X-API-Key
          hide_credentials: true
      
      - name: rate-limiting
        config:
          minute: 100000
          policy: local
          fault_tolerant: true
      
      - name: cors
        config:
          origins:
            - "https://www.aimentor.top"
            - "https://aimentor.top"
          methods:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
            - OPTIONS
          headers:
            - Accept
            - Content-Type
            - Authorization
            - X-API-Key
          credentials: true

  - name: svc-frontend
    url: http://upstream-aether-frontend
    connect_timeout: 5000
    read_timeout: 60000 
    write_timeout: 60000
    tags:
      - frontend
      - web

    routes:
      - name: route-frontend
        paths:
          - /
        methods:
          - GET
          - HEAD
          - OPTIONS
        strip_path: false
        tags:
          - web-route

    plugins:
      - name: proxy-cache
        config:
          content_type:
            - text/html
            - text/css
            - application/javascript
            - image/png
            - image/jpeg
          cache_ttl: 300
          strategy: memory
          cache_control: true
      
      - name: response-transformer
        config:
          add:
            headers:
              - "X-Frame-Options: DENY"
              - "X-Content-Type-Options: nosniff"
              - "X-XSS-Protection: 1; mode=block"
      
      - name: cors
        config:
          origins:
            - "https://www.aimentor.top"
            - "https://aimentor.top"
          methods:
            - GET
            - HEAD
            - OPTIONS
          headers:
            - Accept
            - Content-Type
          credentials: false

consumers:
  - username: app-client-01
    custom_id: client-001
    tags:
      - production
    keyauth_credentials:
      - key: ${{ env "DECK_DEFAULT_API_KEY" }}
        tags:
          - prod-key

  - username: app-client-02
    custom_id: client-002
    tags:
      - test
    keyauth_credentials:
      - key: ${{ env "DECK_PREMIUM_API_KEY" }}
        tags:
          - test-key

plugins:
  - name: correlation-id
    config:
      header_name: X-Request-ID
      generator: uuid
      echo_downstream: true
  
  - name: prometheus
    config:
      per_consumer: true
      status_code_metrics: true
      latency_metrics: true
      upstream_health_metrics: true

  - name: file-log
    config:
      path: /var/log/kong/file-log.log
      reopen: true
