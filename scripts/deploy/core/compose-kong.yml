# compose.kong.yml
# KONG Community Edition Service (DB Mode)
#

services:
  kong:
    image: ${KONG_IMAGE:-kong:3.9.1}
    container_name: kong
    restart: unless-stopped
    environment:
      # Database Configuration
      KONG_DATABASE: postgres
      KONG_PG_HOST: supabase-db
      KONG_PG_PORT: 5432
      KONG_PG_USER: ${KONG_PG_USER:-kong}
      KONG_PG_PASSWORD: ${KONG_PG_PASSWORD:?KONG_PG_PASSWORD is required}
      KONG_PG_DATABASE: ${KONG_PG_DATABASE:-kong}
      KONG_PG_MAX_CONCURRENT_QUERIES: 5
      KONG_PG_MAX_CONCURRENT_CONNECTIONS: 0
      KONG_PG_SSL: "off"
      KONG_PG_SSL_VERIFY: "off"
      
      # Listener Configuration
      KONG_PROXY_LISTEN: 0.0.0.0:8000, 0.0.0.0:8443 ssl http2
      # Admin API on container loopback only — not reachable from app-network.
      # decK sync uses --network container:kong to share the network namespace.
      KONG_ADMIN_LISTEN: 127.0.0.1:8001
      KONG_PROXY_ACCESS_LOG: /var/log/kong/access.log
      KONG_PROXY_ERROR_LOG: /var/log/kong/error.log
      KONG_ADMIN_ACCESS_LOG: /var/log/kong/admin_access.log
      KONG_ADMIN_ERROR_LOG: /var/log/kong/admin_error.log

      # SSL Configuration (enabled when USE_HTTPS=true)
      KONG_SSL_CERTIFICATE: ${KONG_SSL_CERT:-/var/lib/kong/ssl/fullchain.pem}
      KONG_SSL_CERTIFICATE_KEY: ${KONG_SSL_KEY:-/var/lib/kong/ssl/privkey.pem}
      KONG_SSL_PROTOCOLS: TLSv1.2 TLSv1.3

      # Plugin Configuration
      KONG_PLUGINS: bundled

      # Performance Optimization
      KONG_LUA_SSL_TRUSTED_CERTIFICATE: system
      KONG_LUA_SSL_VERIFY_DEPTH: 1
      KONG_PROXY_CACHE_PATH: /tmp/kong/cache levels=1:2 keys_zone=cache:10m max_item_size=100k
      KONG_NGINX_WORKER_PROCESSES: auto
      KONG_NGINX_WORKER_RLIMIT_NOFILE: auto

      # Logging and Monitoring
      KONG_LOG_LEVEL: info
      KONG_ANONYMOUS_REPORTS: "off"

      # Rewrite upstream redirect Location headers (llm-proxy → public host)
      # Regex matches both http:// and https:// from upstream
      KONG_NGINX_LOCATION_PROXY_REDIRECT: "~^https?://llm-proxy:${LLM_PROXY_PORT:-4000}(.*)$ ${FORWARDED_PROTO:-https}://${PUBLIC_HOST}$1"

    volumes:
      - ../ssl:/var/lib/kong/ssl:ro
      - ${DATA_ROOT:-/data}/kong/cache:/tmp/kong/cache
      - ${DATA_ROOT:-/data}/logs/kong:/var/log/kong

    networks:
      - app-network

    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2"
    # Admin API is on container loopback only (no port mapping needed).
    ports:
      - "80:8000"
      - "443:8443"
    healthcheck:
      # test: ["CMD", "curl","-f", "http://0.0.0.0:8001/status"]
      # test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8001/status"]
      test: ["CMD", "kong", "health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  app-network:
    external: true
    name: app-network
