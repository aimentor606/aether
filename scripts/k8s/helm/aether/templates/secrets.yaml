{{- /*
Secrets for Aether deployment.
Values left empty are auto-generated on first install via randAlphaNum.
To rotate: set the value explicitly in values or --set flag.
*/ -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "aether.secretName" . }}
  namespace: {{ include "aether.namespace" . }}
  labels:
    {{- include "aether.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install
    helm.sh/hook-weight: "-5"
type: Opaque
{{- $secretName := include "aether.secretName" . }}
data:
  {{- /*
  For each secret: use provided value, or lookup existing secret, or generate new.
  */ -}}
  {{- with lookup "v1" "Secret" (include "aether.namespace" .) $secretName }}
  {{- /* Secret exists — preserve existing values */ -}}
  POSTGRES_PASSWORD: {{ index .data "POSTGRES_PASSWORD" }}
  JWT_SECRET: {{ index .data "JWT_SECRET" }}
  REDIS_PASSWORD: {{ index .data "REDIS_PASSWORD" }}
  LITELLM_MASTER_KEY: {{ index .data "LITELLM_MASTER_KEY" }}
  LITELLM_SALT_KEY: {{ index .data "LITELLM_SALT_KEY" }}
  DEFAULT_API_KEY: {{ index .data "DEFAULT_API_KEY" }}
  PREMIUM_API_KEY: {{ index .data "PREMIUM_API_KEY" }}
  CLICKHOUSE_PASSWORD: {{ index .data "CLICKHOUSE_PASSWORD" }}
  {{- else }}
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | default (randAlphaNum 32) | b64enc | quote }}
  JWT_SECRET: {{ .Values.secrets.jwtSecret | default (randAlphaNum 48) | b64enc | quote }}
  REDIS_PASSWORD: {{ .Values.secrets.redisPassword | default (randAlphaNum 32) | b64enc | quote }}
  LITELLM_MASTER_KEY: {{ .Values.secrets.litellmMasterKey | default (printf "sk-%s" (randAlphaNum 32)) | b64enc | quote }}
  LITELLM_SALT_KEY: {{ .Values.secrets.litellmSaltKey | default (printf "sk-%s" (randAlphaNum 32)) | b64enc | quote }}
  DEFAULT_API_KEY: {{ .Values.secrets.defaultApiKey | default (randAlphaNum 32) | b64enc | quote }}
  PREMIUM_API_KEY: {{ .Values.secrets.premiumApiKey | default (randAlphaNum 32) | b64enc | quote }}
  CLICKHOUSE_PASSWORD: {{ .Values.secrets.clickhousePassword | default (randAlphaNum 24) | b64enc | quote }}
  {{- end }}

  {{- /* Provider API keys — not auto-generated, set per environment */ -}}
  {{- if .Values.secrets.deepseekApiKey }}
  DEEPSEEK_API_KEY: {{ .Values.secrets.deepseekApiKey | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.qwenApiKey }}
  QWEN_API_KEY: {{ .Values.secrets.qwenApiKey | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.zhipuApiKey }}
  ZHIPU_API_KEY: {{ .Values.secrets.zhipuApiKey | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.openmeterApiKey }}
  OPENMETER_API_KEY: {{ .Values.secrets.openmeterApiKey | b64enc | quote }}
  {{- end }}
