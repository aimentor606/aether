###############################################################################
# Nginx Configuration for LiteLLM Load Balancer
# - least_conn upstream routing
# - SSE support (proxy_buffering off, proxy_cache off)
# - Health checks on backend servers
# References: docs/plans/2026-04-11-litellm-integration-design.md §6.2
###############################################################################

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 4096;
  use epoll;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';

  access_log /var/log/nginx/access.log main;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  types_hash_max_size 2048;
  client_max_body_size 100M;

  # =========================================================================
  # Upstream: LiteLLM backend servers with least_conn load balancing
  # =========================================================================
  upstream litellm_backend {
    least_conn;
    
    server litellm-1:4000 max_fails=3 fail_timeout=30s;
    server litellm-2:4000 max_fails=3 fail_timeout=30s;
    server litellm-3:4000 max_fails=3 fail_timeout=30s;
    server litellm-4:4000 max_fails=3 fail_timeout=30s;
    
    keepalive 32;
  }

  # =========================================================================
  # Server: Main proxy to LiteLLM cluster
  # =========================================================================
  server {
    listen 80 default_server;
    server_name _;

    # Health check endpoint (passthrough)
    location /health {
      access_log off;
      proxy_pass http://litellm_backend;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
    }

    # Main proxy location for all API traffic
    location / {
      proxy_pass http://litellm_backend;
      proxy_http_version 1.1;
      
      # Connection handling
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $server_name;

      # SSE support (streaming responses)
      proxy_buffering off;
      proxy_cache off;
      proxy_read_timeout 600s;
      proxy_send_timeout 600s;
      
      # Request body handling
      proxy_request_buffering off;
      proxy_redirect off;
    }
  }
}
