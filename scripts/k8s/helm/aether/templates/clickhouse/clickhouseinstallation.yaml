{{- if .Values.clickhouse.enabled }}
apiVersion: clickhouse.altinity.com/v1
kind: ClickHouseInstallation
metadata:
  name: {{ include "aether.clickhouse.fullname" . }}
  namespace: {{ include "aether.namespace" . }}
  labels:
    {{- include "aether.labels" . | nindent 4 }}
    app.kubernetes.io/component: clickhouse
spec:
  configuration:
    clusters:
      - name: default
        layout:
          shardsCount: {{ .Values.clickhouse.shards }}
          replicasCount: {{ .Values.clickhouse.replicas }}
    users:
      default/password: ""
      default/networks/ip: "0.0.0.0/0"
      default/profile: default
      default/quota: default
    profiles:
      default/readonly: 0
    settings:
      listen_host: "0.0.0.0"
      log_level: information

  defaults:
    templates:
      podTemplate: pod-template
      dataVolumeClaimTemplate: data-volume
      serviceTemplate: svc-template

  templates:
    podTemplates:
      - name: pod-template
        spec:
          containers:
            - name: clickhouse
              image: {{ printf "clickhouse/clickhouse-server:%s" .Values.clickhouse.version }}
              ports:
                - name: http
                  containerPort: 8123
                - name: tcp
                  containerPort: 9000
                - name: interserver
                  containerPort: 9009
              resources:
                requests:
                  cpu: 250m
                  memory: 512Mi
                limits:
                  cpu: "2"
                  memory: 2Gi
    volumeClaimTemplates:
      - name: data-volume
        spec:
          accessModes: ["ReadWriteOnce"]
          {{- if .Values.clickhouse.storageClass }}
          storageClassName: {{ .Values.clickhouse.storageClass | quote }}
          {{- end }}
          resources:
            requests:
              storage: {{ .Values.clickhouse.storage }}
    serviceTemplates:
      - name: svc-template
        spec:
          type: ClusterIP
          ports:
            - name: http
              port: 8123
            - name: tcp
              port: 9000
{{- end }}
