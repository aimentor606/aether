# compose.litellm.yml
# LiteLLM Proxy Service (alternative to NewAPI)
# Select via: LLM_PROXY=litellm in ops/.env

services:
  llm-proxy:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: llm-proxy
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://${LITELLM_DB_USER:-litellm}:${LITELLM_DB_PASSWORD:?LITELLM_DB_PASSWORD is required}@postgres:5432/${LITELLM_DB_DATABASE:-litellm}
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:?LITELLM_MASTER_KEY is required}
      - LITELLM_SALT_KEY=${LITELLM_SALT_KEY:?LITELLM_SALT_KEY is required}
      - STORE_MODEL_IN_DB=True
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      - TZ=${TZ:-Asia/Shanghai}
      - PROXY_BASE_URL=${FORWARDED_PROTO:-https}://${PUBLIC_HOST}
      # Trust Kong's X-Forwarded-* headers (fixes trailing-slash redirect URLs)
      # See: https://github.com/BerriAI/litellm/pull/24956
      - FORWARDED_ALLOW_IPS=*
      # config.yaml uses os.environ/ to read these at runtime
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - QWEN_API_KEY=${QWEN_API_KEY:-}
      - ZHIPU_API_KEY=${ZHIPU_API_KEY:-}
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2"
    volumes:
      - ./config/litellm/config.yaml:/app/config.yaml:ro
      - /data/logs/litellm:/app/logs
    ports:
      - "127.0.0.1:4000:4000"
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    command:
      - "--config"
      - "/app/config.yaml"
      - "--port"
      - "4000"

networks:
  app-network:
    external: true
    name: app-network
