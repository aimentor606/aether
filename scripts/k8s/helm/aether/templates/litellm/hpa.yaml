{{- if and .Values.litellm.enabled .Values.litellm.hpa.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "aether.litellm.fullname" . }}
  namespace: {{ include "aether.namespace" . }}
  labels:
    {{- include "aether.labels" . | nindent 4 }}
    app.kubernetes.io/component: litellm
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "aether.litellm.fullname" . }}
  minReplicas: {{ .Values.litellm.hpa.minReplicas }}
  maxReplicas: {{ .Values.litellm.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.litellm.hpa.targetCPUUtilizationPercentage }}
{{- end }}
